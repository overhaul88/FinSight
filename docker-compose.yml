services:
  finsight-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: finsight-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - mlflow
    restart: unless-stopped
    networks:
      - finsight-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: finsight-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlruns.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped
    networks:
      - finsight-net

  finsight-ingest:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: finsight-ingest
    command: python scripts/ingest.py --data-dir /app/data/raw --vector-store faiss
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - mlflow
    profiles:
      - ingest
    networks:
      - finsight-net

volumes:
  mlflow-data:

networks:
  finsight-net:
    driver: bridge
