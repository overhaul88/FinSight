name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify deployment prerequisites
        run: |
          test -n "${{ secrets.EC2_HOST }}"
          test -n "${{ secrets.EC2_USER }}"
          test -n "${{ secrets.EC2_SSH_KEY }}"
          test -n "${{ secrets.EC2_APP_DIR }}"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            test -f .env || cp .env.example .env

            docker compose pull || true
            docker compose up -d --build
            docker compose ps
            docker compose logs --tail=50 finsight-api
